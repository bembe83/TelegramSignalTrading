# Chat-specific configuration
# This file contains settings specific to a particular Telegram chat/channel
# Copy this file and customize for each chat you want to monitor

# Chat identification
CHAT_NAME=ForexSignals
CHAT_USERNAME=@your_channel
CHAT_ID=  # Optional: numeric chat ID if known

# Broker and symbol configuration
BROKER=YourBrokerHashFromTerminalFolder
SYMBOL_POSTFIX=-STD
MARKET_TYPE=MT5
DEFAULT_VOLUME=0.1

# Execution mode
# MT5_EXECUTION_MODE: direct | file
# - direct: send trade directly to MT5 via MetaTrader5 Python package
# - file: generate JSON in terminal input folder (EA handles execution)
# Note: MT4 always uses file generation regardless of this flag.
MT5_EXECUTION_MODE=file
MT5_LOGIN=
MT5_PASSWORD=
MT5_SERVER=
MT5_TERMINAL_PATH=
MT5_MAGIC=20260325
MT5_DEVIATION=20

# Optional symbol mapping (signal symbol -> broker symbol)
# Keys are normalized to uppercase when inserted in DB.
# If mapping is missing, fallback is UPPERCASE(signal_symbol) + SYMBOL_POSTFIX.
SYMBOL_MAPPING='{
  "XAUUSD": "XAUUSDm",
  "BTCUSD": "BTCUSDm"
}'

# Signal parsing configuration
# Customize these patterns based on your channel's signal format
# Example pattern with default group mappings:
#   (BUY|SELL)\s+([A-Z0-9._/-]+)(?:\s+@?\s*([\d.]+))?\s+SL[:\s]+([\d.]+)\s+TP[:\s]+([\d.]+)
#   Group 1: BUY/SELL direction
#   Group 2: EURUSD symbol
#   Group 3: 1.0850 price (optional for market)
#   Group 4: 1.0830 stop loss
#   Group 5: 1.0900 take profit
SIGNAL_PATTERNS='{
  "create_market": "(BUY|SELL)\s+([A-Z0-9._/-]+)(?:\s+@?\s*([\d.]+))?\s+SL[:\s]+([\d.]+)\s+TP[:\s]+([\d.]+)",
  "create_pending": "(BUY|SELL)\s+(STOP|LIMIT)\s+([A-Z0-9._/-]+)(?:\s+@?\s*([\d.]+))?\s+SL[:\s]+([\d.]+)\s+TP[:\s]+([\d.]+)",
}'

# AI Classification prompt customization (optional)
# Currently informational for telegram_signal_monitor_mt.py
AI_PROMPT_CUSTOM=""

# Processing options
ENABLE_AI_FILTERING=true
FALLBACK_TO_REGEX=true

# Database source identifier
DB_SOURCE=ForexSignals

# Regex capture-group indexes for parsing signals
# DIRECTION_GROUP: which group contains BUY/SELL or order type (e.g. "BUY LIMIT", "SELL STOP")
# SYMBOL_GROUP: which group contains the currency pair or symbol
# PRICE_GROUP: which group contains the entry price (optional for market orders, required for pending)
# SL_GROUP, TP_GROUP: comma-separated list of groups to check for SL/TP (picks first non-empty)
DIRECTION_GROUP=1
SYMBOL_GROUP=2
PRICE_GROUP=3
SL_GROUP=4
TP_GROUP=5